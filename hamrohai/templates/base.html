<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HamrohAI - AI o'quv platforma{% endblock %}</title>
    <style>
        /* ========== RESET ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --primary:      #2563eb;
          --primary-dark: #1d4ed8;
          --primary-light:#eff6ff;
          --red:          #ef4444;
          --gray-50:      #f9fafb;
          --gray-100:     #f3f4f6;
          --gray-200:     #e5e7eb;
          --gray-300:     #d1d5db;
          --gray-400:     #9ca3af;
          --gray-500:     #6b7280;
          --gray-600:     #4b5563;
          --gray-700:     #374151;
          --gray-900:     #111827;
          --r:            8px;
          --rl:           12px;
          --rxl:          16px;
          --sh:           0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
          --shm:          0 4px 6px rgba(0,0,0,.06);
          --shl:          0 10px 25px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.04);
        }

        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          color: var(--gray-900); background: #fff;
          min-height: 100vh; line-height: 1.5;
        }

        /* ========== GRADIENT TEXT ========== */
        .gt {
          background: linear-gradient(135deg, var(--primary), #06b6d4);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        /* ========== BUTTONS ========== */
        .btn {
          display: inline-flex; align-items: center; justify-content: center;
          gap: 6px; padding: 8px 16px; border-radius: var(--r);
          font-size: 14px; font-weight: 500; cursor: pointer; border: none;
          transition: all .15s; white-space: nowrap; font-family: inherit;
        }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .bp {
          background: var(--primary);
          color: #fff;
        }
        .bp:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
        .bo { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-200); }
        .bo:hover:not(:disabled) { background: var(--gray-50); border-color: var(--gray-300); }
        .bg { background: transparent; color: var(--gray-600); }
        .bg:hover:not(:disabled) { background: var(--gray-100); }
        .bd { background: #fff; color: var(--red); border: 1px solid var(--gray-200); }
        .bd:hover:not(:disabled) { background: #fef2f2; }
        .bsm { padding: 5px 10px; font-size: 13px; }
        .blg { padding: 12px 28px; font-size: 16px; }
        .bic { padding: 8px; width: 36px; height: 36px; }
        .bfw { width: 100%; }

        /* ========== CARD ========== */
        .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--rl); box-shadow: var(--sh); }
        .ch { padding: 20px 24px 0; }
        .ct { font-size: 18px; font-weight: 600; }
        .cd { font-size: 14px; color: var(--gray-500); margin-top: 4px; }
        .cc { padding: 20px 24px; }

        /* ========== FORM ========== */
        .fg { display: flex; flex-direction: column; gap: 6px; }

        label { font-size: 14px; font-weight: 500; color: var(--gray-700); }
        input[type=text], input[type=email], input[type=password], textarea, select {
          width: 100%; padding: 9px 12px;
          border: 1px solid var(--gray-200); border-radius: var(--r);
          font-size: 14px; color: var(--gray-900); background: #fff;
          outline: none; font-family: inherit;
          transition: border-color .15s, box-shadow .15s;
        }
        input:focus, textarea:focus, select:focus {
          border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        input:disabled, textarea:disabled, select:disabled {
          opacity: .5; background: var(--gray-50); cursor: not-allowed;
        }
        textarea { resize: vertical; min-height: 90px; }

        /* ========== SPINNER ========== */
        @keyframes spin { to { transform: rotate(360deg); } }
        .sp {
          width: 16px; height: 16px;
          border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
          border-radius: 50%; animation: spin .7s linear infinite;
          display: inline-block; flex-shrink: 0;
        }
        .spp {
          width: 40px; height: 40px; border-width: 3px;
          border-color: rgba(37,99,235,.15); border-top-color: var(--primary);
        }

        /* ========== HEADER ========== */
        .hdr {
          position: sticky; top: 0; z-index: 50;
          background: rgba(255,255,255,.95); backdrop-filter: blur(8px);
          border-bottom: 1px solid var(--gray-200);
        }
        .hdi {
          display: flex; align-items: center; gap: 12px;
          padding: 14px 24px; max-width: 1024px; margin: 0 auto;
        }

        /* ========== LANDING ========== */
        .lp { min-height: 100vh; display: flex; flex-direction: column; background: #fff; }
        .lph { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--gray-100); }
        .lpn { display: flex; gap: 10px; }
        .lhero { flex: 1; display: flex; align-items: center; justify-content: center; padding: 72px 24px 56px; }
        .hc { max-width: 760px; text-align: center; }
        .hbdg {
          display: inline-flex; align-items: center; gap: 6px;
          background: var(--primary-light); color: var(--primary);
          padding: 6px 18px; border-radius: 999px;
          font-size: 13px; font-weight: 500; margin-bottom: 28px;
          border: 1px solid rgba(37,99,235,.15);
        }
        .htit {
          font-size: clamp(34px,5.5vw,56px); font-weight: 800;
          line-height: 1.15; margin-bottom: 20px; color: var(--gray-900);
        }
        .htit .l1 { color: var(--primary); }
        .htit .l2 { color: var(--gray-900); }
        .hdesc { font-size: 17px; color: var(--gray-500); margin-bottom: 40px; max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.75; }
        .hact { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 72px; }
        .lfeat { padding: 56px 24px; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
        .lfeat-inner { max-width: 900px; margin: 0 auto; }
        .lfeat-title { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .lfeat-sub { text-align: center; font-size: 15px; color: var(--gray-500); margin-bottom: 40px; }
        .fgrid { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 20px; }
        .fc { background: #fff; border-radius: var(--rxl); padding: 28px 24px; text-align: left; border: 1px solid var(--gray-200); transition: box-shadow .2s, transform .2s; }
        .fc:hover { box-shadow: var(--shm); transform: translateY(-2px); }
        .fic { width: 44px; height: 44px; border-radius: var(--rl); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .fic svg { width: 22px; height: 22px; }
        .fic-1 { background: var(--primary-light); color: var(--primary); }
        .fic-2 { background: #f0fdf4; color: #16a34a; }
        .fic-3 { background: #fff7ed; color: #ea580c; }
        .fic-4 { background: #fdf4ff; color: #9333ea; }
        .ftit { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--gray-900); }
        .fdesc { font-size: 13px; color: var(--gray-500); line-height: 1.6; }
        .lft { padding: 24px; text-align: center; color: var(--gray-400); font-size: 13px; border-top: 1px solid var(--gray-100); }

        /* ========== AUTH ========== */
        .ap { min-height: 100vh; background: var(--gray-50); display: flex; align-items: center; justify-content: center; padding: 24px; }
        .ac { width: 100%; max-width: 400px; background: #fff; border-radius: var(--rxl); box-shadow: var(--shl); border: 1px solid var(--gray-200); overflow: hidden; }
        .ach { padding: 32px 32px 0; text-align: center; }
        .alo { margin-bottom: 12px; }
        .alo-icon { width: 48px; height: 48px; background: var(--primary-light); border-radius: var(--rl); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .alo-icon svg { width: 24px; height: 24px; color: var(--primary); }
        .att { font-size: 22px; font-weight: 700; margin-bottom: 4px; margin-top: 12px; }
        .ast { font-size: 14px; color: var(--gray-500); }
        .ab { padding: 28px 32px 32px; }
        .alink { text-align: center; margin-top: 16px; font-size: 14px; color: var(--gray-500); }
        .alink a { color: var(--primary); font-weight: 500; cursor: pointer; }
        .alink a:hover { text-decoration: underline; }

        /* ========== PAGE LAYOUT ========== */
        .bkpg { min-height: 100vh; background: var(--gray-50); }
        .pghdr { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 20px 24px; }
        .pghdi { max-width: 1024px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .pgt { font-size: 22px; font-weight: 700; }
        .pgs { font-size: 14px; color: var(--gray-500); margin-top: 2px; }
        .pgc { max-width: 1024px; margin: 0 auto; padding: 32px 24px; }
        .bkgrd { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 20px; }
        .bkcard {
          background: #fff; border: 1px solid var(--gray-200);
          border-radius: var(--rl); padding: 20px;
          display: flex; flex-direction: column; gap: 14px;
          transition: box-shadow .2s, transform .2s;
        }
        .bkcard:hover { box-shadow: var(--shm); transform: translateY(-2px); }
        .bkico { width: 48px; height: 48px; background: var(--primary-light); border-radius: var(--rl); display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .bktit { font-size: 16px; font-weight: 600; }
        .bkmeta { font-size: 13px; color: var(--gray-500); }
        .bkact { display: flex; gap: 8px; margin-top: auto; }
        .bkact .btn { flex: 1; font-size: 13px; }

        /* ========== EMPTY STATE ========== */
        .es { text-align: center; padding: 72px 24px; color: var(--gray-400); }
        .esico { margin-bottom: 16px; }
        .esico svg { width: 48px; height: 48px; color: var(--gray-300); }
        .estit { font-size: 18px; font-weight: 600; color: var(--gray-500); margin-bottom: 6px; }
        .esdesc { font-size: 14px; }

        /* ========== TABS ========== */
        .rdpg { min-height: 100vh; display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--gray-200); background: #fff; padding: 0 24px; }
        .tbtn { padding: 13px 20px; font-size: 14px; font-weight: 500; color: var(--gray-500); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; }
        .tbtn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tbtn:hover:not(.active) { color: var(--gray-700); }
        .tpanel { display: none; padding: 32px 24px; max-width: 820px; margin: 0 auto; width: 100%; }
        .tpanel.active { display: block; }
        .btxt { font-size: 16px; line-height: 1.9; color: var(--gray-700); white-space: pre-wrap; }
        .chitem { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--rl); padding: 22px; margin-bottom: 16px; }
        .chnum { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
        .chtit { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .chcont { font-size: 15px; line-height: 1.85; color: var(--gray-600); white-space: pre-wrap; }
        .rsec { margin-top: 16px; padding: 12px 14px; background: var(--primary-light); border-radius: var(--r); }
        .rlbl { font-size: 12px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; }
        .rtags { display: flex; flex-wrap: wrap; gap: 6px; }
        .rtag { background: #fff; color: var(--primary); border: 1px solid rgba(37,99,235,.2); border-radius: 999px; padding: 3px 12px; font-size: 13px; }

        /* ========== ADVENTURE ========== */
        .advpg { display: flex; flex-direction: column; }
        .advset { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; min-height: calc(100vh - 65px); }
        .scard { width: 100%; max-width: 440px; }
        .sico { width: 68px; height: 68px; background: var(--primary-light); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .sico svg { width: 32px; height: 32px; color: var(--primary); }
        .stit { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .sdesc { font-size: 14px; color: var(--gray-500); text-align: center; margin-bottom: 24px; }
        .rprev { background: var(--primary-light); border-radius: var(--r); padding: 14px; margin-top: 4px; }
        .rplbl { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 8px; }

        /* CHAT */
        .cwrap { display: flex; flex-direction: column; height: calc(100vh - 65px); }
        .cmsgs { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; }
        .msg.user { justify-content: flex-end; }
        .msg.assistant { justify-content: flex-start; }
        .mbbl { max-width: 76%; border-radius: 18px; padding: 12px 16px; white-space: pre-wrap; word-break: break-word; line-height: 1.65; font-size: 15px; }
        .msg.user .mbbl { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant .mbbl { background: #fff; border: 1px solid var(--gray-200); border-bottom-left-radius: 4px; box-shadow: var(--sh); }
        .mtime { font-size: 11px; margin-top: 5px; opacity: .6; }
        .cinp { padding: 14px 24px 18px; background: #fff; border-top: 1px solid var(--gray-200); }
        .crow { display: flex; gap: 8px; align-items: center; }
        .crow input { flex: 1; border-radius: 999px; padding: 10px 18px; }
        .chint { font-size: 12px; color: var(--gray-400); margin-top: 6px; text-align: center; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-6px);opacity:1} }
        .typi { display: flex; gap: 5px; align-items: center; padding: 14px 18px; background: #fff; border: 1px solid var(--gray-200); border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: var(--sh); width: fit-content; }
        .tdot { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
        .tdot:nth-child(2){animation-delay:.2s} .tdot:nth-child(3){animation-delay:.4s}

        /* ========== ADMIN ========== */
        .admpg { min-height: 100vh; background: var(--gray-50); }
        .admgrd { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 16px; }
        .admcard { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--rl); padding: 18px; }
        .admtit { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .admmeta { font-size: 13px; color: var(--gray-500); margin-bottom: 14px; }
        .admact { display: flex; gap: 8px; }

        /* ========== FORM PAGE ========== */
        .fpg { min-height: 100vh; background: var(--gray-50); }
        .fcont { max-width: 820px; margin: 0 auto; padding: 32px 24px; }
        .sechdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .sectit { font-size: 16px; font-weight: 600; }
        .secdesc { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
        .chcard { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--rl); margin-bottom: 12px; }
        .cchdr { padding: 14px 18px; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
        .cchtit { font-size: 14px; font-weight: 600; color: var(--gray-700); }
        .ccbody { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
        .rlist { display: flex; flex-direction: column; gap: 8px; }
        .rrow { display: flex; gap: 6px; align-items: center; }
        .rrow input { flex: 1; }
        .factions { display: flex; justify-content: flex-end; gap: 10px; padding-top: 8px; }
        .svy4 > * + * { margin-top: 16px; }
        .svy8 > * + * { margin-top: 32px; }

        /* ========== TOAST ========== */
        #tc { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        @keyframes si { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes fo { to{opacity:0;transform:translateX(20px)} }
        .tst { min-width: 270px; max-width: 380px; padding: 12px 16px; border-radius: var(--rl); font-size: 14px; font-weight: 500; box-shadow: var(--shl); animation: si .25s ease; display: flex; align-items: center; gap: 10px; pointer-events: all; }
        .tst.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
        .tst.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        .tst.info    { background: var(--primary-light); border: 1px solid rgba(37,99,235,.25); color: var(--primary-dark); }

        /* ========== DIALOG ========== */
        .dov { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .dlg { background: #fff; border-radius: var(--rxl); padding: 26px; max-width: 400px; width: 100%; box-shadow: var(--shl); }
        .dtit { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .ddesc { font-size: 14px; color: var(--gray-500); margin-bottom: 20px; line-height: 1.6; }
        .dact { display: flex; justify-content: flex-end; gap: 8px; }

        /* ========== 404 ========== */
        .nf { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        .nfc { font-size: 90px; font-weight: 800; line-height: 1; color: var(--primary); margin-bottom: 8px; }
        .nft { font-size: 22px; font-weight: 600; color: var(--gray-700); margin-bottom: 8px; }
        .nfd { font-size: 15px; color: var(--gray-500); margin-bottom: 24px; }

        /* ========== RESPONSIVE ========== */
        @media(max-width:768px){
          .lph{padding:14px 20px}
          .hdi,.pghdi{padding:12px 16px}
          .hact,.lpn{flex-wrap:wrap}
          .hact .btn{width:100%;max-width:300px}
          .ach,.ab{padding:20px}
          .bkgrd,.admgrd,.fgrid{grid-template-columns:1fr}
          .pgc,.fcont{padding:20px 16px}
          .cmsgs,.cinp{padding-left:16px;padding-right:16px}
          .mbbl{max-width:90%}
          .tpanel{padding:20px 16px}
          .lhero{padding:48px 20px 40px}
        }
        @media(max-width:480px){
          .htit{font-size:30px}
          .hdesc{font-size:15px}
          .blg{padding:11px 22px;font-size:15px}
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <div id="tc"></div>
</body>
</html>
