{% extends 'base.html' %}
{% block title %}{{ course.name }}{% endblock %}

{% block content %}
<div class="bkpg">
  <div class="pghdr">
    <div class="pghdi">
      <div><div class="pgt">{{ course.name }}</div><div class="pgs">Sizning kursingiz</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn bg bsm" onclick="window.location.href='{% url 'logout' %}'">Chiqish</button>
      </div>
    </div>
  </div>
  <div class="pgc">
    <div class="bkcard">
      <div class="bkico">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div><div class="bktit">{{ course.name }}</div><div class="bkmeta">{{ course.description }}</div></div>
      <div class="bkact">
        <button class="btn bp" onclick="alert('Kurs boshlandi!')">Boshlash</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
